<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>HoloHuman</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; color: #eee;
      font-family: system-ui, "Segoe UI", sans-serif; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    body.mirror canvas { transform: scaleY(-1); } /* 45° glass / holo-fan mode */

    #subtitle { position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
      max-width: 70%; padding: 8px 16px; border-radius: 10px; background: rgba(0,0,0,.55);
      font-size: 17px; line-height: 1.5; text-align: center; pointer-events: none;
      opacity: 0; transition: opacity .25s; }
    #subtitle.show { opacity: 1; }

    #bar { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      display: flex; gap: 8px; align-items: center; padding: 8px;
      background: rgba(20,20,28,.8); border: 1px solid #333; border-radius: 14px;
      backdrop-filter: blur(8px); }
    #bar { max-width: 96vw; flex-wrap: wrap; justify-content: center; }
    #bar input { width: min(32vw, 340px); padding: 10px 12px; border-radius: 9px;
      border: 1px solid #444; background: #111; color: #eee; font-size: 15px; outline: none; }
    #bar button, #bar select { padding: 10px 14px; border-radius: 9px; border: 1px solid #444;
      background: #1c1c26; color: #eee; font-size: 15px; cursor: pointer; }
    #bar button:active { background: #2e2e40; }
    #mic.on { background: #1a4a2a; border-color: #3a8a5a; }
    #mic.rec { background: #a1262d; border-color: #d33; }
    #status { position: fixed; top: 12px; left: 12px; font-size: 12px; color: #888; }
    #hint { position: fixed; inset: 0; display: grid; place-items: center; text-align: center;
      color: #aaa; font-size: 15px; line-height: 2; pointer-events: none; }
    #hint.hidden { display: none; }
  </style>
  <script type="module" crossorigin src="/assets/index-DyUBEL3z.js"></script>
</head>
<body>
  <div id="app"></div>
  <div id="hint" class="hidden">No avatar loaded.<br>Drop a <b>.vrm</b> file here, or put it at <code>holohuman/models/avatar.vrm</code></div>
  <div id="subtitle"></div>
  <div id="status"></div>
  <div id="bar">
    <select id="mode" title="Display mode">
      <option value="standard">Standard</option>
      <option value="pyramid">Pyramid 4-view</option>
      <option value="mirror">Single reflection</option>
    </select>
    <select id="emotion" title="Emotion">
      <option value="auto">Auto</option>
      <option value="neutral">😐 Neutral</option>
      <option value="happy">🙂 Happy</option>
      <option value="laugh">😄 Laugh</option>
      <option value="sad">🙁 Sad</option>
      <option value="cry">😢 Cry</option>
      <option value="angry">😠 Angry</option>
      <option value="surprised">😮 Surprised</option>
    </select>
    <button id="dance" title="Dance (舞蹈)">💃</button>
    <select id="action" title="Action (动作)">
      <option value="">🙆 Action</option>
      <option value="heart">🫰 Heart 比心</option>
      <option value="wave">👋 Wave 挥手</option>
      <option value="squat">🏋️ Squat 深蹲</option>
      <option value="jump">🦘 Jump 跳跃</option>
    </select>
    <select id="role" title="Role (角色)">
      <option value="mina">🎭 Mina</option>
      <option value="service">客服 Support</option>
      <option value="programmer">程序员 Coder</option>
      <option value="teacher">老师 Teacher</option>
      <option value="doctor">医生 Doctor</option>
      <option value="girlfriend">女友 Girlfriend</option>
    </select>
    <select id="voice" title="Voice (语种)">
      <option value="">🔊 Default voice</option>
      <option value="af_heart">Heart 甜美</option>
      <option value="af_bella">Bella 女主播</option>
      <option value="af_sarah">Sarah 清新</option>
      <option value="bf_emma">Emma 英式</option>
      <option value="am_adam">Adam 男声</option>
    </select>
    <button id="view" title="Switch camera view (视角切换)">📷</button>
    <input id="text" placeholder="Say something… (Enter to send)" autocomplete="off" />
    <button id="send">Send</button>
    <button id="mic" title="Auto listen (activates on first click)">🎤</button>
  </div>
</body>
</html>
